<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>情绪支持助手</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ec4899">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // 简单的SVG图标组件
        const Heart = ({ className }) => (
            <svg className={className} viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
            </svg>
        );

        const Camera = ({ className }) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                <circle cx="12" cy="13" r="4"/>
            </svg>
        );

        const Mic = ({ className }) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                <line x1="12" y1="19" x2="12" y2="23"/>
                <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
        );

        const MessageCircle = ({ className }) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
            </svg>
        );

        const Globe = ({ className }) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <circle cx="12" cy="12" r="10"/>
                <line x1="2" y1="12" x2="22" y2="12"/>
                <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
            </svg>
        );

        const FileText = ({ className }) => (
          <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14,2 14,8 20,8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <line x1="10" y1="9" x2="8" y2="9"/>
          </svg>
        );

        const Plus = ({ className }) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <line x1="12" y1="5" x2="12" y2="19"/>
                <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
        );

        const Play = ({ className }) => (
            <svg className={className} viewBox="0 0 24 24" fill="currentColor">
                <path d="M8 5v14l11-7z"/>
            </svg>
        );

        const Pause = ({ className }) => (
            <svg className={className} viewBox="0 0 24 24" fill="currentColor">
                <rect x="6" y="4" width="4" height="16"/>
                <rect x="14" y="4" width="4" height="16"/>
            </svg>
        );

        const Square = ({ className }) => (
            <svg className={className} viewBox="0 0 24 24" fill="currentColor">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
            </svg>
        );

        const EmotionalSupportApp = () => {
          const [currentView, setCurrentView] = useState('main');
          const [sosMode, setSosMode] = useState('photo');
          const [mixedMode, setMixedMode] = useState('photo-audio');
          const [currentIndex, setCurrentIndex] = useState(0);
          const [language, setLanguage] = useState('zh');
          const [photoDuration, setPhotoDuration] = useState(20);
          const [uploadedAudios, setUploadedAudios] = useState([]);
          const [uploadedPhotos, setUploadedPhotos] = useState([]);
          const [defaultPhotos, setDefaultPhotos] = useState([
            { 
              id: 1, 
              url: 'https://images.unsplash.com/photo-1544027993-37dbfe43562a?w=800&h=600&fit=crop&q=80', 
              description: { zh: '和好朋友的合照', en: 'Photo with good friends' },
              isDefault: true
            },
            { 
              id: 2, 
              url: 'https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=800&h=600&fit=crop&q=80', 
              description: { zh: '初中时光', en: 'Middle school days' },
              isDefault: true
            },
            { 
              id: 3, 
              url: 'https://images.unsplash.com/photo-1511988617509-a57c8a288659?w=800&h=600&fit=crop&q=80', 
              description: { zh: '温暖的回忆', en: 'Warm memories' },
              isDefault: true
            },
            { 
              id: 4, 
              url: 'https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=800&h=600&fit=crop&q=80', 
              description: { zh: '美丽的自然风光', en: 'Beautiful nature scenery' },
              isDefault: true
            },
            { 
              id: 5, 
              url: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&h=600&fit=crop&q=80', 
              description: { zh: '宁静的湖泊', en: 'Peaceful lake' },
              isDefault: true
            }
          ]);
          const [defaultMemories, setDefaultMemories] = useState([
            { 
              id: 1, 
              title: { zh: '第一次获奖', en: 'First Award' }, 
              content: { zh: '记得那天你特别开心，眼睛都在发光。那种成就感是多么珍贵，它证明了你的努力和才能。', en: 'Remember how happy you were that day, your eyes were shining. That sense of achievement was so precious, proving your efforts and talents.' },
              isDefault: true
            },
            { 
              id: 2, 
              title: { zh: '和朋友的午餐', en: 'Lunch with Friends' }, 
              content: { zh: '那次聊天聊到忘记时间，你笑得特别灿烂。友谊的温暖总是能治愈一切烦恼。', en: 'That time you chatted until you forgot the time, you smiled so brightly. The warmth of friendship can always heal all troubles.' },
              isDefault: true
            },
            { 
              id: 3, 
              title: { zh: '克服困难', en: 'Overcoming Challenges' }, 
              content: { zh: '你曾经觉得不可能的事情，最后都做到了。这说明你比自己想象的更坚强、更有能力。', en: 'Things you once thought impossible, you eventually accomplished them all. This shows you are stronger and more capable than you imagine.' },
              isDefault: true
            },
            { 
              id: 4, 
              title: { zh: '家人的拥抱', en: 'Family Hug' }, 
              content: { zh: '那个温暖的拥抱，让你感受到无条件的爱。家人永远是你最坚实的后盾。', en: 'That warm hug made you feel unconditional love. Family will always be your strongest support.' },
              isDefault: true
            },
            { 
              id: 5, 
              title: { zh: '内心的平静', en: 'Inner Peace' }, 
              content: { zh: '即使在最困难的时候，你内心深处仍有一片宁静的角落。那里是你力量的源泉。', en: 'Even in the most difficult times, there is still a peaceful corner deep in your heart. That is the source of your strength.' },
              isDefault: true
            }
          ]);
          const [notepadContent, setNotepadContent] = useState('');
          const [isAudioPlaying, setIsAudioPlaying] = useState(false);
          const intervalRef = useRef(null);
          const audioRef = useRef(null);

          // 多语言文本
          const texts = {
            zh: {
              title: '情绪支持助手',
              subtitle: '你不是一个人，我们在这里陪伴你',
              sosButton: '🆘 紧急安抚',
              photoMode: '📸 安全照片',
              audioMode: '🎵 温暖声音',
              messageMode: '💭 正面记忆',
              mixedMode: '🔄 混合模式',
              photoAudioMode: '📸🎵 照片+音乐',
              memoryAudioMode: '💭🎵 文字+音乐',
              safePhotos: '安全照片',
              supportSounds: '支持声音',
              positiveMemories: '正面记忆',
              photosCount: '张照片',
              audiosCount: '段录音',
              memoriesCount: '个回忆',
              stop: '停止',
              back: '← 返回',
              yourMemories: '你的美好回忆',
              returnHome: '返回主页',
              photoDuration: '照片停留时间',
              seconds: '秒',
              minute: '分钟',
              minutes: '分钟',
              permanent: '永久',
              photoSettings: '照片设置',
              replay: '重播',
              pause: '暂停',
              resume: '继续',
              notepad: '心灵笔记',
              writeNote: '写下你的美好回忆或正面想法...',
              uploadPhoto: '上传照片',
              uploadAudio: '上传音频',
              addMemory: '添加回忆',
              next: '下一个',
              previous: '上一个'
            },
            en: {
              title: 'Emotional Support Assistant',
              subtitle: 'You are not alone, we are here with you',
              sosButton: '🆘 Emergency Comfort',
              photoMode: '📸 Safe Photos',
              audioMode: '🎵 Warm Sounds',
              messageMode: '💭 Positive Memories',
              mixedMode: '🔄 Mixed Mode',
              photoAudioMode: '📸🎵 Photo+Music',
              memoryAudioMode: '💭🎵 Text+Music',
              safePhotos: 'Safe Photos',
              supportSounds: 'Support Sounds',
              positiveMemories: 'Positive Memories',
              photosCount: 'photos',
              audiosCount: 'audios',
              memoriesCount: 'memories',
              stop: 'Stop',
              back: '← Back',
              yourMemories: 'Your Beautiful Memories',
              returnHome: 'Return Home',
              photoDuration: 'Photo Duration',
              seconds: 'seconds',
              minute: 'minute',
              minutes: 'minutes',
              permanent: 'Permanent',
              photoSettings: 'Photo Settings',
              replay: 'Replay',
              pause: 'Pause',
              resume: 'Resume',
              notepad: 'Heart Notes',
              writeNote: 'Write your beautiful memories or positive thoughts...',
              uploadPhoto: 'Upload Photo',
              uploadAudio: 'Upload Audio',
              addMemory: 'Add Memory',
              next: 'Next',
              previous: 'Previous'
            }
          };

          const t = texts[language];

          // 合并默认照片和用户上传的照片
          const allPhotos = [...defaultPhotos, ...uploadedPhotos];

          // 合并默认回忆和Notepad内容
          const allMemories = notepadContent.trim() ? 
            [...defaultMemories, {
              id: 'notepad',
              title: { zh: '我的心灵笔记', en: 'My Heart Notes' },
              content: { zh: notepadContent, en: notepadContent },
              isNotepad: true
            }] : defaultMemories;

          // 音频播放控制函数
          const playAudio = (audioUrl) => {
            if (audioRef.current) {
              audioRef.current.src = audioUrl;
              audioRef.current.play().then(() => {
                setIsAudioPlaying(true);
              }).catch(err => {
                console.log('播放失败:', err);
              });
            }
          };

          const pauseAudio = () => {
            if (audioRef.current) {
              audioRef.current.pause();
              setIsAudioPlaying(false);
            }
          };

          const resumeAudio = () => {
            if (audioRef.current) {
              audioRef.current.play().then(() => {
                setIsAudioPlaying(true);
              });
            }
          };

          const stopAudio = () => {
            if (audioRef.current) {
              audioRef.current.pause();
              audioRef.current.currentTime = 0;
              setIsAudioPlaying(false);
            }
          };

          // SOS按钮功能
          const handleSOS = () => {
            setCurrentIndex(0);
            
            if (sosMode === 'photo') {
              startPhotoSlideshow();
            } else if (sosMode === 'audio') {
              if (uploadedAudios.length > 0) {
                setCurrentView('audio');
                setTimeout(() => {
                  const firstAudio = uploadedAudios[0];
                  if (firstAudio && audioRef.current) {
                    playAudio(firstAudio.audioUrl);
                  }
                }, 100);
              } else {
                setCurrentView('audio');
              }
            } else if (sosMode === 'message') {
              if (allMemories.length > 0) {
                setCurrentView('memories-slideshow');
              } else {
                setCurrentView('memories');
              }
            } else if (sosMode === 'mixed') {
              if (mixedMode === 'photo-audio') {
                if (allPhotos.length > 0 && uploadedAudios.length > 0) {
                  setCurrentView('mixed-photo-audio');
                  if (photoDuration > 0) {
                    intervalRef.current = setInterval(() => {
                      setCurrentIndex(prev => (prev + 1) % allPhotos.length);
                    }, photoDuration * 1000);
                  }
                  setTimeout(() => {
                    const firstAudio = uploadedAudios[0];
                    if (firstAudio && audioRef.current) {
                      playAudio(firstAudio.audioUrl);
                    }
                  }, 100);
                } else {
                  alert(t.photoAudioMode + ' needs both photos and audio files');
                }
              } else if (mixedMode === 'memory-audio') {
                if (allMemories.length > 0 && uploadedAudios.length > 0) {
                  setCurrentView('mixed-memory-audio');
                  setTimeout(() => {
                    const firstAudio = uploadedAudios[0];
                    if (firstAudio && audioRef.current) {
                      playAudio(firstAudio.audioUrl);
                    }
                  }, 100);
                } else {
                  alert(t.memoryAudioMode + ' needs both memories and audio files');
                }
              }
            }
          };

          const playNextAudio = () => {
            if (uploadedAudios.length > 1) {
              const nextIndex = (currentIndex + 1) % uploadedAudios.length;
              setCurrentIndex(nextIndex);
              const nextAudio = uploadedAudios[nextIndex];
              if (nextAudio && audioRef.current) {
                playAudio(nextAudio.audioUrl);
              }
            } else if (uploadedAudios.length === 1) {
              if (audioRef.current) {
                audioRef.current.currentTime = 0;
                audioRef.current.play();
              }
            }
          };

          const startPhotoSlideshow = () => {
            setCurrentView('slideshow');
            if (photoDuration > 0) {
              intervalRef.current = setInterval(() => {
                setCurrentIndex(prev => (prev + 1) % allPhotos.length);
              }, photoDuration * 1000);
            }
          };

          const stopSOS = () => {
            if (intervalRef.current) {
              clearInterval(intervalRef.current);
            }
            stopAudio();
            setCurrentView('main');
          };

          // 文件上传处理
          const handlePhotoUpload = (event) => {
            const files = Array.from(event.target.files);
            files.forEach(file => {
              if (file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (e) => {
                  const newPhoto = {
                    id: Date.now() + Math.random(),
                    url: e.target.result,
                    description: { zh: file.name, en: file.name },
                    isDefault: false
                  };
                  setUploadedPhotos(prev => [...prev, newPhoto]);
                };
                reader.readAsDataURL(file);
              }
            });
          };

          const handleAudioUpload = (event) => {
            const files = Array.from(event.target.files);
            files.forEach(file => {
              if (file.type.startsWith('audio/')) {
                const reader = new FileReader();
                reader.onload = (e) => {
                  const newAudio = {
                    id: Date.now() + Math.random(),
                    name: file.name,
                    audioUrl: e.target.result
                  };
                  setUploadedAudios(prev => [...prev, newAudio]);
                };
                reader.readAsDataURL(file);
              }
            });
          };

          // 初始化音频元素
          useEffect(() => {
            if (audioRef.current) {
              audioRef.current.addEventListener('ended', playNextAudio);
              return () => {
                if (audioRef.current) {
                  audioRef.current.removeEventListener('ended', playNextAudio);
                }
              };
            }
          }, [uploadedAudios, currentIndex]);

          // 主界面
          if (currentView === 'main') {
            return (
              <div className="min-h-screen bg-gradient-to-br from-blue-50 to-purple-50 p-4">
                <div className="max-w-md mx-auto">
                  {/* 语言切换按钮 */}
                  <div className="flex justify-end pt-4 mb-4">
                    <button
                      onClick={() => setLanguage(language === 'zh' ? 'en' : 'zh')}
                      className="flex items-center space-x-2 bg-gradient-to-br from-pink-50 to-rose-50 border border-pink-100 px-3 py-2 rounded-lg shadow-sm hover:from-pink-100 hover:to-rose-100"
                    >
                      <Globe className="w-4 h-4 text-gray-600" />
                      <span className="text-sm text-gray-600">
                        {language === 'zh' ? 'EN' : '中文'}
                      </span>
                    </button>
                  </div>

                  {/* 标题 */}
                  <div className="text-center mb-8">
                    <Heart className="w-12 h-12 text-pink-500 mx-auto mb-2" />
                    <h1 className="text-2xl font-bold text-gray-800 mb-2">{t.title}</h1>
                    <p className="text-gray-600">{t.subtitle}</p>
                  </div>

                  {/* SOS 按钮 */}
                  <div className="mb-8">
                    <button
                      onClick={handleSOS}
                      className="w-full bg-red-500 hover:bg-red-600 text-white text-xl font-bold py-6 px-8 rounded-full shadow-lg transform transition-all duration-200 hover:scale-105 active:scale-95"
                    >
                      {t.sosButton}
                    </button>
                    
                    {/* SOS 模式选择 */}
                    <div className="mt-4 grid grid-cols-2 gap-2">
                      <button
                        onClick={() => setSosMode('photo')}
                        className={`py-2 px-4 rounded-lg text-sm transition-colors ${sosMode === 'photo' ? 'bg-blue-500 text-white' : 'bg-gradient-to-br from-pink-50 to-rose-50 border border-pink-100 text-gray-700'}`}
                      >
                        {t.photoMode}
                      </button>
                      <button
                        onClick={() => setSosMode('audio')}
                        className={`py-2 px-4 rounded-lg text-sm transition-colors ${sosMode === 'audio' ? 'bg-blue-500 text-white' : 'bg-gradient-to-br from-pink-50 to-rose-50 border border-pink-100 text-gray-700'}`}
                      >
                        {t.audioMode}
                      </button>
                      <button
                        onClick={() => setSosMode('message')}
                        className={`py-2 px-4 rounded-lg text-sm transition-colors ${sosMode === 'message' ? 'bg-blue-500 text-white' : 'bg-gradient-to-br from-pink-50 to-rose-50 border border-pink-100 text-gray-700'}`}
                      >
                        {t.messageMode}
                      </button>
                      <button
                        onClick={() => setSosMode('mixed')}
                        className={`py-2 px-4 rounded-lg text-sm transition-colors ${sosMode === 'mixed' ? 'bg-blue-500 text-white' : 'bg-gradient-to-br from-pink-50 to-rose-50 border border-pink-100 text-gray-700'}`}
                      >
                        {t.mixedMode}
                      </button>
                    </div>

                    {/* 混合模式的子选项 */}
                    {sosMode === 'mixed' && (
                      <div className="mt-4 p-4 bg-gradient-to-r from-purple-50 to-pink-50 border border-purple-200 rounded-lg">
                        <p className="text-sm text-gray-700 mb-3 text-center font-medium">
                          {language === 'zh' ? '选择混合模式类型:' : 'Choose Mixed Mode Type:'}
                        </p>
                        <div className="grid grid-cols-1 gap-2">
                          <button
                            onClick={() => setMixedMode('photo-audio')}
                            className={`py-3 px-4 rounded-lg text-sm transition-colors ${mixedMode === 'photo-audio' ? 'bg-purple-500 text-white' : 'bg-white border border-purple-200 text-gray-700 hover:bg-purple-50'}`}
                          >
                            {t.photoAudioMode}
                            <p className="text-xs mt-1 opacity-80">
                              {language === 'zh' ? '同时播放照片幻灯片和背景音乐' : 'Play photo slideshow with background music'}
                            </p>
                          </button>
                          <button
                            onClick={() => setMixedMode('memory-audio')}
                            className={`py-3 px-4 rounded-lg text-sm transition-colors ${mixedMode === 'memory-audio' ? 'bg-purple-500 text-white' : 'bg-white border border-purple-200 text-gray-700 hover:bg-purple-50'}`}
                          >
                            {t.memoryAudioMode}
                            <p className="text-xs mt-1 opacity-80">
                              {language === 'zh' ? '显示文字回忆并播放背景音乐' : 'Show text memories with background music'}
                            </p>
                          </button>
                        </div>
                      </div>
                    )}
                  </div>

                  {/* 设置区域 */}
                  <div className="bg-gradient-to-br from-pink-50 to-rose-50 border border-pink-100 p-4 rounded-xl shadow-md mb-6">
                    <h3 className="font-semibold text-gray-800 mb-4 text-center">{t.photoSettings}</h3>
                    
                    <div>
                      <p className="text-sm text-gray-600 mb-2">{t.photoDuration}:</p>
                      <div className="grid grid-cols-3 gap-2">
                        {[
                          { value: 10, label: `10 ${t.seconds}` },
                          { value: 20, label: `20 ${t.seconds}` },
                          { value: 60, label: `1 ${t.minute}` },
                          { value: 300, label: `5 ${t.minutes}` },
                          { value: 1800, label: `30 ${t.minutes}` },
                          { value: 0, label: t.permanent }
                        ].map(option => (
                          <button
                            key={option.value}
                            onClick={() => setPhotoDuration(option.value)}
                            className={`py-2 px-2 rounded-lg text-xs transition-colors ${
                              photoDuration === option.value 
                                ? 'bg-blue-500 text-white' 
                                : 'bg-gray-100 text-gray-700 hover:bg-gray-200'
                            }`}
                          >
                            {option.label}
                          </button>
                        ))}
                      </div>
                    </div>
                  </div>

                  {/* 功能卡片 */}
                  <div className="grid grid-cols-1 gap-4">
                    <div 
                      onClick={() => setCurrentView('photos')}
                      className="bg-gradient-to-br from-pink-50 to-rose-50 border border-pink-100 p-4 rounded-xl shadow-md cursor-pointer hover:shadow-lg hover:from-pink-100 hover:to-rose-100 transition-all"
                    >
                      <div className="flex items-center">
                        <Camera className="w-8 h-8 text-pink-500 mr-3" />
                        <div>
                          <h3 className="font-semibold text-gray-800">{t.safePhotos}</h3>
                          <p className="text-sm text-gray-600">{allPhotos.length} {t.photosCount}</p>
                        </div>
                      </div>
                    </div>

                    <div 
                      onClick={() => setCurrentView('audios')}
                      className="bg-gradient-to-br from-pink-50 to-rose-50 border border-pink-100 p-4 rounded-xl shadow-md cursor-pointer hover:shadow-lg hover:from-pink-100 hover:to-rose-100 transition-all"
                    >
                      <div className="flex items-center">
                        <Mic className="w-8 h-8 text-pink-500 mr-3" />
                        <div>
                          <h3 className="font-semibold text-gray-800">{t.supportSounds}</h3>
                          <p className="text-sm text-gray-600">{uploadedAudios.length} {t.audiosCount}</p>
                        </div>
                      </div>
                    </div>

                    <div 
                      onClick={() => setCurrentView('memories')}
                      className="bg-gradient-to-br from-pink-50 to-rose-50 border border-pink-100 p-4 rounded-xl shadow-md cursor-pointer hover:shadow-lg hover:from-pink-100 hover:to-rose-100 transition-all"
                    >
                      <div className="flex items-center">
                        <MessageCircle className="w-8 h-8 text-pink-500 mr-3" />
                        <div>
                          <h3 className="font-semibold text-gray-800">{t.positiveMemories}</h3>
                          <p className="text-sm text-gray-600">{allMemories.length} {t.memoriesCount}</p>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>

                {/* 隐藏的音频元素 */}
                <audio ref={audioRef} style={{display: 'none'}} />
              </div>
            );
          }

          // 照片幻灯片视图
          if (currentView === 'slideshow') {
            return (
              <div className="min-h-screen bg-black relative overflow-hidden">
                <button
                  onClick={stopSOS}
                  className="absolute top-4 left-4 z-10 bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg font-semibold"
                >
                  {t.stop}
                </button>
                
                <div className="absolute top-4 right-4 z-10 text-white text-sm bg-black bg-opacity-50 px-3 py-2 rounded-lg">
                  {currentIndex + 1} / {allPhotos.length}
                </div>

                {allPhotos.length > 0 && (
                  <div className="w-full h-screen flex items-center justify-center">
                    <img
                      src={allPhotos[currentIndex].url}
                      alt={allPhotos[currentIndex].description[language]}
                      className="max-w-full max-h-full object-contain"
                    />
                  </div>
                )}

                <div className="absolute bottom-4 left-1/2 transform -translate-x-1/2 text-white text-center bg-black bg-opacity-50 px-4 py-2 rounded-lg">
                  <p className="text-lg font-medium">
                    {allPhotos.length > 0 ? allPhotos[currentIndex].description[language] : ''}
                  </p>
                </div>
              </div>
            );
          }

          // 照片管理视图
          if (currentView === 'photos') {
            return (
              <div className="min-h-screen bg-gradient-to-br from-blue-50 to-purple-50 p-4">
                <div className="max-w-md mx-auto">
                  <div className="flex items-center justify-between mb-6">
                    <button
                      onClick={() => setCurrentView('main')}
                      className="text-blue-600 hover:text-blue-800 font-medium"
                    >
                      {t.back}
                    </button>
                    <h2 className="text-xl font-bold text-gray-800">{t.safePhotos}</h2>
                    <div></div>
                  </div>

                  {/* 上传按钮 */}
                  <div className="mb-6">
                    <label className="w-full bg-blue-500 hover:bg-blue-600 text-white py-3 px-4 rounded-lg cursor-pointer flex items-center justify-center space-x-2 transition-colors">
                      <Plus className="w-5 h-5" />
                      <span>{t.uploadPhoto}</span>
                      <input
                        type="file"
                        accept="image/*"
                        multiple
                        onChange={handlePhotoUpload}
                        className="hidden"
                      />
                    </label>
                  </div>

                  {/* 照片网格 */}
                  <div className="grid grid-cols-2 gap-4">
                    {allPhotos.map((photo, index) => (
                      <div key={photo.id} className="relative group">
                        <img
                          src={photo.url}
                          alt={photo.description[language]}
                          className="w-full h-32 object-cover rounded-lg shadow-md"
                        />
                        <div className="absolute bottom-0 left-0 right-0 bg-black bg-opacity-50 text-white text-xs p-2 rounded-b-lg">
                          {photo.description[language]}
                        </div>
                      </div>
                    ))}
                  </div>

                  {/* 开始幻灯片按钮 */}
                  {allPhotos.length > 0 && (
                    <div className="mt-8">
                      <button
                        onClick={startPhotoSlideshow}
                        className="w-full bg-green-500 hover:bg-green-600 text-white py-4 px-6 rounded-lg font-semibold text-lg"
                      >
                        📸 {language === 'zh' ? '开始照片幻灯片' : 'Start Photo Slideshow'}
                      </button>
                    </div>
                  )}
                </div>
              </div>
            );
          }

          // 音频管理视图
          if (currentView === 'audios') {
            return (
              <div className="min-h-screen bg-gradient-to-br from-blue-50 to-purple-50 p-4">
                <div className="max-w-md mx-auto">
                  <div className="flex items-center justify-between mb-6">
                    <button
                      onClick={() => setCurrentView('main')}
                      className="text-blue-600 hover:text-blue-800 font-medium"
                    >
                      {t.back}
                    </button>
                    <h2 className="text-xl font-bold text-gray-800">{t.supportSounds}</h2>
                    <div></div>
                  </div>

                  {/* 上传按钮 */}
                  <div className="mb-6">
                    <label className="w-full bg-blue-500 hover:bg-blue-600 text-white py-3 px-4 rounded-lg cursor-pointer flex items-center justify-center space-x-2 transition-colors">
                      <Plus className="w-5 h-5" />
                      <span>{t.uploadAudio}</span>
                      <input
                        type="file"
                        accept="audio/*"
                        multiple
                        onChange={handleAudioUpload}
                        className="hidden"
                      />
                    </label>
                  </div>

                  {/* 音频列表 */}
                  <div className="space-y-4">
                    {uploadedAudios.map((audio, index) => (
                      <div key={audio.id} className="bg-white p-4 rounded-lg shadow-md border">
                        <div className="flex items-center justify-between">
                          <div className="flex-1">
                            <p className="font-medium text-gray-800 truncate">{audio.name}</p>
                          </div>
                          <button
                            onClick={() => {
                              setCurrentIndex(index);
                              if (isAudioPlaying && currentIndex === index) {
                                pauseAudio();
                              } else {
                                playAudio(audio.audioUrl);
                                setCurrentIndex(index);
                              }
                            }}
                            className="ml-3 bg-blue-500 hover:bg-blue-600 text-white p-2 rounded-full"
                          >
                            {isAudioPlaying && currentIndex === index ? 
                              <Pause className="w-4 h-4" /> : 
                              <Play className="w-4 h-4" />
                            }
                          </button>
                        </div>
                      </div>
                    ))}
                  </div>

                  {uploadedAudios.length === 0 && (
                    <div className="text-center py-8">
                      <Mic className="w-16 h-16 text-gray-300 mx-auto mb-4" />
                      <p className="text-gray-500">
                        {language === 'zh' ? '还没有上传音频文件' : 'No audio files uploaded yet'}
                      </p>
                    </div>
                  )}
                </div>

                <audio ref={audioRef} style={{display: 'none'}} />
              </div>
            );
          }

          // 音频播放视图
          if (currentView === 'audio') {
            return (
              <div className="min-h-screen bg-gradient-to-br from-purple-900 to-blue-900 p-4 text-white">
                <div className="max-w-md mx-auto text-center">
                  <button
                    onClick={stopSOS}
                    className="absolute top-4 left-4 bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg font-semibold"
                  >
                    {t.stop}
                  </button>

                  <div className="mt-20">
                    <Mic className="w-24 h-24 text-white mx-auto mb-8" />
                    
                    {uploadedAudios.length > 0 ? (
                      <>
                        <h2 className="text-2xl font-bold mb-4">{uploadedAudios[currentIndex]?.name}</h2>
                        <p className="text-lg opacity-80 mb-8">
                          {currentIndex + 1} / {uploadedAudios.length}
                        </p>
                        
                        <div className="flex justify-center space-x-4">
                          <button
                            onClick={() => {
                              if (isAudioPlaying) {
                                pauseAudio();
                              } else {
                                resumeAudio();
                              }
                            }}
                            className="bg-white text-purple-900 p-4 rounded-full hover:bg-gray-100"
                          >
                            {isAudioPlaying ? <Pause className="w-8 h-8" /> : <Play className="w-8 h-8" />}
                          </button>
                          
                          <button
                            onClick={playNextAudio}
                            className="bg-white text-purple-900 p-4 rounded-full hover:bg-gray-100"
                          >
                            <span className="text-xl">⏭️</span>
                          </button>
                        </div>
                      </>
                    ) : (
                      <div className="text-center">
                        <h2 className="text-2xl font-bold mb-4">
                          {language === 'zh' ? '还没有音频文件' : 'No Audio Files'}
                        </h2>
                        <p className="text-lg opacity-80">
                          {language === 'zh' ? '请先上传一些音频文件' : 'Please upload some audio files first'}
                        </p>
                      </div>
                    )}
                  </div>
                </div>

                <audio ref={audioRef} style={{display: 'none'}} />
              </div>
            );
          }

          // 回忆管理视图
          if (currentView === 'memories') {
            return (
              <div className="min-h-screen bg-gradient-to-br from-blue-50 to-purple-50 p-4">
                <div className="max-w-md mx-auto">
                  <div className="flex items-center justify-between mb-6">
                    <button
                      onClick={() => setCurrentView('main')}
                      className="text-blue-600 hover:text-blue-800 font-medium"
                    >
                      {t.back}
                    </button>
                    <h2 className="text-xl font-bold text-gray-800">{t.positiveMemories}</h2>
                    <div></div>
                  </div>

                  {/* 心灵笔记区域 */}
                  <div className="mb-6 bg-gradient-to-br from-pink-50 to-rose-50 border border-pink-100 p-4 rounded-xl shadow-md">
                    <h3 className="font-semibold text-gray-800 mb-3 flex items-center">
                      <FileText className="w-5 h-5 mr-2 text-pink-500" />
                      {t.notepad}
                    </h3>
                    <textarea
                      value={notepadContent}
                      onChange={(e) => setNotepadContent(e.target.value)}
                      placeholder={t.writeNote}
                      className="w-full h-24 p-3 border border-pink-200 rounded-lg resize-none focus:outline-none focus:ring-2 focus:ring-pink-300"
                    />
                  </div>

                  {/* 默认回忆列表 */}
                  <div className="space-y-4">
                    {allMemories.map((memory, index) => (
                      <div key={memory.id} className={`p-4 rounded-xl shadow-md border ${memory.isNotepad ? 'bg-gradient-to-br from-yellow-50 to-orange-50 border-yellow-200' : 'bg-white border-gray-200'}`}>
                        <h3 className="font-semibold text-gray-800 mb-2">
                          {memory.title[language]}
                        </h3>
                        <p className="text-gray-600 leading-relaxed">
                          {memory.content[language]}
                        </p>
                      </div>
                    ))}
                  </div>

                  {/* 开始回忆幻灯片按钮 */}
                  {allMemories.length > 0 && (
                    <div className="mt-8">
                      <button
                        onClick={() => {
                          setCurrentIndex(0);
                          setCurrentView('memories-slideshow');
                        }}
                        className="w-full bg-green-500 hover:bg-green-600 text-white py-4 px-6 rounded-lg font-semibold text-lg"
                      >
                        💭 {language === 'zh' ? '开始回忆幻灯片' : 'Start Memory Slideshow'}
                      </button>
                    </div>
                  )}
                </div>
              </div>
            );
          }

          // 回忆幻灯片视图
          if (currentView === 'memories-slideshow') {
            return (
              <div className="min-h-screen bg-gradient-to-br from-purple-900 to-pink-900 p-4 text-white">
                <button
                  onClick={stopSOS}
                  className="absolute top-4 left-4 z-10 bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg font-semibold"
                >
                  {t.stop}
                </button>
                
                <div className="absolute top-4 right-4 z-10 text-white text-sm bg-black bg-opacity-50 px-3 py-2 rounded-lg">
                  {currentIndex + 1} / {allMemories.length}
                </div>

                <div className="max-w-md mx-auto flex items-center justify-center min-h-screen">
                  {allMemories.length > 0 && (
                    <div className="text-center px-6">
                      <h2 className="text-3xl font-bold mb-8">
                        {allMemories[currentIndex].title[language]}
                      </h2>
                      <p className="text-xl leading-relaxed">
                        {allMemories[currentIndex].content[language]}
                      </p>
                    </div>
                  )}
                </div>

                <div className="absolute bottom-8 left-1/2 transform -translate-x-1/2 flex space-x-4">
                  <button
                    onClick={() => setCurrentIndex(prev => prev > 0 ? prev - 1 : allMemories.length - 1)}
                    className="bg-white bg-opacity-20 hover:bg-opacity-30 text-white px-6 py-3 rounded-lg"
                  >
                    {t.previous}
                  </button>
                  <button
                    onClick={() => setCurrentIndex(prev => (prev + 1) % allMemories.length)}
                    className="bg-white bg-opacity-20 hover:bg-opacity-30 text-white px-6 py-3 rounded-lg"
                  >
                    {t.next}
                  </button>
                </div>
              </div>
            );
          }

          // 混合模式：照片+音频
          if (currentView === 'mixed-photo-audio') {
            return (
              <div className="min-h-screen bg-black relative overflow-hidden">
                <button
                  onClick={stopSOS}
                  className="absolute top-4 left-4 z-10 bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg font-semibold"
                >
                  {t.stop}
                </button>
                
                <div className="absolute top-4 right-4 z-10 text-white text-sm bg-black bg-opacity-50 px-3 py-2 rounded-lg">
                  📸 {currentIndex + 1} / {allPhotos.length}
                </div>

                <div className="absolute top-4 left-1/2 transform -translate-x-1/2 z-10 text-white text-sm bg-black bg-opacity-50 px-3 py-2 rounded-lg">
                  🎵 {uploadedAudios[Math.min(currentIndex, uploadedAudios.length - 1)]?.name || ''}
                </div>

                {allPhotos.length > 0 && (
                  <div className="w-full h-screen flex items-center justify-center">
                    <img
                      src={allPhotos[currentIndex].url}
                      alt={allPhotos[currentIndex].description[language]}
                      className="max-w-full max-h-full object-contain"
                    />
                  </div>
                )}

                <div className="absolute bottom-4 left-1/2 transform -translate-x-1/2 text-white text-center bg-black bg-opacity-50 px-4 py-2 rounded-lg">
                  <p className="text-lg font-medium">
                    {allPhotos.length > 0 ? allPhotos[currentIndex].description[language] : ''}
                  </p>
                </div>

                <audio ref={audioRef} style={{display: 'none'}} />
              </div>
            );
          }

          // 混合模式：回忆+音频
          if (currentView === 'mixed-memory-audio') {
            return (
              <div className="min-h-screen bg-gradient-to-br from-purple-900 to-pink-900 p-4 text-white">
                <button
                  onClick={stopSOS}
                  className="absolute top-4 left-4 z-10 bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg font-semibold"
                >
                  {t.stop}
                </button>
                
                <div className="absolute top-4 right-4 z-10 text-white text-sm bg-black bg-opacity-50 px-3 py-2 rounded-lg">
                  💭 {currentIndex + 1} / {allMemories.length}
                </div>

                <div className="absolute top-4 left-1/2 transform -translate-x-1/2 z-10 text-white text-sm bg-black bg-opacity-50 px-3 py-2 rounded-lg">
                  🎵 {uploadedAudios[0]?.name || ''}
                </div>

                <div className="max-w-md mx-auto flex items-center justify-center min-h-screen">
                  {allMemories.length > 0 && (
                    <div className="text-center px-6">
                      <h2 className="text-3xl font-bold mb-8">
                        {allMemories[currentIndex].title[language]}
                      </h2>
                      <p className="text-xl leading-relaxed">
                        {allMemories[currentIndex].content[language]}
                      </p>
                    </div>
                  )}
                </div>

                <div className="absolute bottom-8 left-1/2 transform -translate-x-1/2 flex space-x-4">
                  <button
                    onClick={() => setCurrentIndex(prev => prev > 0 ? prev - 1 : allMemories.length - 1)}
                    className="bg-white bg-opacity-20 hover:bg-opacity-30 text-white px-6 py-3 rounded-lg"
                  >
                    {t.previous}
                  </button>
                  <button
                    onClick={() => setCurrentIndex(prev => (prev + 1) % allMemories.length)}
                    className="bg-white bg-opacity-20 hover:bg-opacity-30 text-white px-6 py-3 rounded-lg"
                  >
                    {t.next}
                  </button>
                </div>

                <audio ref={audioRef} style={{display: 'none'}} />
              </div>
            );
          }

          // 默认返回主界面
          return (
            <div className="min-h-screen bg-gradient-to-br from-blue-50 to-purple-50 p-4 flex items-center justify-center">
              <div className="text-center">
                <Heart className="w-16 h-16 text-pink-500 mx-auto mb-4" />
                <h1 className="text-2xl font-bold text-gray-800 mb-2">情绪支持助手</h1>
                <p className="text-gray-600 mb-4">加载中...</p>
                <button 
                  onClick={() => setCurrentView('main')}
                  className="bg-pink-500 text-white px-6 py-3 rounded-lg hover:bg-pink-600 transition-colors"
                >
                  返回主页
                </button>
              </div>
            </div>
          );
        };

        ReactDOM.render(React.createElement(EmotionalSupportApp), document.getElementById('root'));
    </script>
</body>
</html>
