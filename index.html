<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>情绪支持助手</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ec4899">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #fdf2f8 0%, #f3e8ff 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            min-height: 100vh;
            position: relative;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            gap: 8px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #ec4899 0%, #be185d 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(236, 72, 153, 0.3);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(236, 72, 153, 0.4);
        }
        .btn-secondary {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }
        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
        }
        .btn-success {
            background: linear-gradient(135deg, #10b981 0%, #047857 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }
        .btn-warning {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);
        }
        .btn-danger {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
        }
        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 24px;
            margin: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .grid {
            display: grid;
            gap: 16px;
        }
        .grid-2 {
            grid-template-columns: 1fr 1fr;
        }
        .text-center {
            text-align: center;
        }
        .mb-4 {
            margin-bottom: 16px;
        }
        .mb-6 {
            margin-bottom: 24px;
        }
        .mt-4 {
            margin-top: 16px;
        }
        .p-4 {
            padding: 16px;
        }
        .rounded-lg {
            border-radius: 12px;
        }
        .shadow {
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
            box-sizing: border-box;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #ec4899;
        }
        .upload-area {
            border: 2px dashed #ec4899;
            border-radius: 12px;
            padding: 32px;
            text-align: center;
            background: rgba(236, 72, 153, 0.05);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .upload-area:hover {
            background: rgba(236, 72, 153, 0.1);
            border-color: #be185d;
        }
        .sos-button {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
            font-size: 24px;
            font-weight: bold;
            padding: 20px;
            border-radius: 20px;
            border: none;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(239, 68, 68, 0.4);
            transition: all 0.3s ease;
            margin: 20px 0;
        }
        .sos-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(239, 68, 68, 0.5);
        }
        .language-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 50px;
            padding: 8px 16px;
            cursor: pointer;
            font-weight: 600;
            color: #6b7280;
        }
        .photo-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 16px;
        }
        .photo-item {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 1;
        }
        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .photo-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.7));
            padding: 8px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        .audio-item {
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            border: 1px solid #0ea5e9;
            border-radius: 12px;
            padding: 16px;
            margin: 8px 0;
        }
        .memory-item {
            background: linear-gradient(135deg, #fdf4ff 0%, #fae8ff 100%);
            border: 1px solid #d946ef;
            border-radius: 12px;
            padding: 16px;
            margin: 8px 0;
        }
        .fullscreen-view {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .fullscreen-image {
            max-width: 90%;
            max-height: 80%;
            object-fit: contain;
            border-radius: 12px;
        }
        .fullscreen-controls {
            position: absolute;
            bottom: 40px;
            left: 0;
            right: 0;
            text-align: center;
        }
        .nav-button {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
        }
        .nav-button.left {
            left: 20px;
        }
        .nav-button.right {
            right: 20px;
        }
        .progress-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 14px;
        }
        .duration-indicator {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
        .settings-section {
            background: rgba(255, 255, 255, 0.8);
            border-radius: 16px;
            padding: 20px;
            margin: 16px 0;
        }
        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin-top: 16px;
        }
        .duration-btn {
            padding: 12px 8px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            text-align: center;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .duration-btn.active {
            border-color: #ec4899;
            background: #fdf2f8;
            color: #be185d;
            font-weight: 600;
        }
        .mixed-controls {
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 20px;
            border-radius: 12px;
            margin: 16px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { Heart, Camera, Mic, MessageCircle, FileText, Play, Pause, Volume2, Settings, Home, Globe } = lucide;

        const EmotionalSupportApp = () => {
            const [currentView, setCurrentView] = useState('main');
            const [language, setLanguage] = useState('zh');
            const [currentIndex, setCurrentIndex] = useState(0);
            const [isAudioPlaying, setIsAudioPlaying] = useState(false);
            const [photoDuration, setPhotoDuration] = useState(10);
            const [sosTimer, setSosTimer] = useState(null);
            const [notepadContent, setNotepadContent] = useState('');
            const [uploadedPhotos, setUploadedPhotos] = useState([]);
            const [uploadedAudios, setUploadedAudios] = useState([]);
            const [defaultMemories, setDefaultMemories] = useState([]);
            const [defaultPhotos, setDefaultPhotos] = useState([]);
            
            const audioRef = useRef(null);
            const sosIntervalRef = useRef(null);

            // 翻译文本
            const translations = {
                zh: {
                    appTitle: '情绪支持助手',
                    tagline: '你不是一个人，我们在这里陪伴你',
                    sosButton: 'SOS 紧急安抚',
                    safePhotos: '安全照片',
                    supportSounds: '温暖声音',
                    positiveMemories: '正面记忆',
                    mixedMode: '混合模式',
                    back: '← 返回',
                    stop: '停止',
                    pause: '暂停',
                    resume: '恢复',
                    play: '播放',
                    returnHome: '返回主页',
                    yourMemories: '你的回忆',
                    photoSettings: '照片设置',
                    photoDuration: '照片停留时间:',
                    permanent: '永久',
                    seconds: '秒',
                    minute: '分钟',
                    minutes: '分钟',
                    uploadPhotos: '上传照片',
                    uploadAudios: '上传音频',
                    writeMemory: '写下回忆',
                    photoSlideshow: '照片幻灯片',
                    memorySlideshow: '回忆幻灯片',
                    audioPlayback: '音频播放',
                    mixedPhotoAudio: '照片 + 音乐',
                    mixedMemoryAudio: '回忆 + 音乐'
                },
                en: {
                    appTitle: 'Emotional Support Assistant',
                    tagline: "You're not alone, we're here with you",
                    sosButton: 'SOS Emergency Comfort',
                    safePhotos: 'Safe Photos',
                    supportSounds: 'Support Sounds',
                    positiveMemories: 'Positive Memories',
                    mixedMode: 'Mixed Mode',
                    back: '← Back',
                    stop: 'Stop',
                    pause: 'Pause',
                    resume: 'Resume',
                    play: 'Play',
                    returnHome: 'Return Home',
                    yourMemories: 'Your Memories',
                    photoSettings: 'Photo Settings',
                    photoDuration: 'Photo Duration:',
                    permanent: 'Permanent',
                    seconds: 'seconds',
                    minute: 'minute',
                    minutes: 'minutes',
                    uploadPhotos: 'Upload Photos',
                    uploadAudios: 'Upload Audios',
                    writeMemory: 'Write Memory',
                    photoSlideshow: 'Photo Slideshow',
                    memorySlideshow: 'Memory Slideshow',
                    audioPlayback: 'Audio Playback',
                    mixedPhotoAudio: 'Photos + Music',
                    mixedMemoryAudio: 'Memories + Music'
                }
            };

            const t = translations[language];

            // 默认数据
            useEffect(() => {
                // 默认照片
                setDefaultPhotos([
                    {
                        id: 'default-1',
                        url: 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAwIiBoZWlnaHQ9IjMwMCIgdmlld0JveD0iMCAwIDQwMCAzMDAiIGZpbGw9Im5vbmUiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+CjxyZWN0IHdpZHRoPSI0MDAiIGhlaWdodD0iMzAwIiBmaWxsPSIjZmRmMmY4Ii8+CjxjaXJjbGUgY3g9IjIwMCIgY3k9IjE1MCIgcj0iNjAiIGZpbGw9IiNmYjcxODUiLz4KPHN2ZyB4PSIxNzAiIHk9IjEyMCIgd2lkdGg9IjYwIiBoZWlnaHQ9IjYwIiBmaWxsPSJ3aGl0ZSI+CjxwYXRoIGQ9Ik0yMCAxNGMwLTIuMjA5IDEuNzkxLTQgNC00aDhjMi4yMDkgMCA0IDEuNzkxIDQgNHY2YzAgMi4yMDktMS43OTEgNC00IDRoLThjLTIuMjA5IDAtNC0xLjc5MS00LTR2LTZ6Ii8+CjxjaXJjbGUgY3g9IjI4IiBjeT0iMTciIHI9IjMiIGZpbGw9IiNmYjcxODUiLz4KPC9zdmc+Cjx0ZXh0IHg9IjIwMCIgeT0iMjQwIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBmb250LWZhbWlseT0ic2Fucy1zZXJpZiIgZm9udC1zaXplPSIxOCIgZmlsbD0iIzZiNzI4MCI+5riF5paw55qE5pyd6Ziz6ZiF5YWJPz9z4jAiIGZvbnQtc2l6ZT0iMTQiIGZpbGw9IiM5Y2EzYWYiPueCueWHu+S4iuS8oOmcnOimgeS/neeVmeeahOaXtuWIuTwvdGV4dD4KPC9zdmc+',
                        description: {
                            zh: '清新的朝阳阳光',
                            en: 'Fresh Morning Sunshine'
                        },
                        isDefault: true
                    },
                    {
                        id: 'default-2',
                        url: 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAwIiBoZWlnaHQ9IjMwMCIgdmlld0JveD0iMCAwIDQwMCAzMDAiIGZpbGw9Im5vbmUiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+CjxyZWN0IHdpZHRoPSI0MDAiIGhlaWdodD0iMzAwIiBmaWxsPSIjZWZmNmZmIi8+CjxwYXRoIGQ9Ik0xMDAgMTUwYzAtNTUuMjI4IDQ0Ljc3Mi0xMDAgMTAwLTEwMHMxMDAgNDQuNzcyIDEwMCAxMDAiIHN0cm9rZT0iI2Q5NDZlZiIgc3Ryb2tlLXdpZHRoPSI4IiBmaWxsPSJub25lIi8+CjxjaXJjbGUgY3g9IjE1MCIgY3k9IjEyMCIgcj0iMTUiIGZpbGw9IiNmYmNmZTgiLz4KPGNpcmNsZSBjeD0iMjUwIiBjeT0iMTIwIiByPSIxNSIgZmlsbD0iI2ZiY2ZlOCIvPgo8cGF0aCBkPSJNMTgwIDIwMGMwLTEwIDEwLTIwIDIwLTIwczIwIDEwIDIwIDIwIiBzdHJva2U9IiNkOTQ2ZWYiIHN0cm9rZS13aWR0aD0iNCIgZmlsbD0ibm9uZSIvPgo8dGV4dCB4PSIyMDAiIHk9IjI2MCIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZm9udC1mYW1pbHk9InNhbnMtc2VyaWYiIGZvbnQtc2l6ZT0iMTgiIGZpbGw9IiM2YjcyODAiPuW6t+enkOeahOW+rumineaXtuWFiTwvdGV4dD4KPHR4dCB4PSIyMDAiIHk9IjI4MCIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZm9udC1mYW1pbHk9InNhbnMtc2VyaWYiIGZvbnQtc2l6ZT0iMTQiIGZpbGw9IiM5Y2EzYWYiPuaxguWdjuW/q+S5kOeahOaXpeWtkDwvdGV4dD4KPC9zdmc+',
                        description: {
                            zh: '幸福的微笑时光',
                            en: 'Happy Smiling Moments'
                        },
                        isDefault: true
                    }
                ]);

                // 默认回忆
                setDefaultMemories([
                    {
                        id: 'memory-1',
                        title: {
                            zh: '我的成就',
                            en: 'My Achievements'
                        },
                        content: {
                            zh: '今天我完成了一项重要的任务，虽然过程很困难，但我坚持下来了。这让我意识到自己比想象中更有能力和韧性。',
                            en: 'Today I completed an important task. Although the process was difficult, I persevered. This made me realize that I am more capable and resilient than I thought.'
                        },
                        isDefault: true
                    },
                    {
                        id: 'memory-2',
                        title: {
                            zh: '感谢的话语',
                            en: 'Words of Gratitude'
                        },
                        content: {
                            zh: '我想起朋友对我说的话："你是一个特别的人，值得被爱和关心。"这些话在我最需要的时候给了我力量。',
                            en: 'I remember what my friend said to me: "You are a special person who deserves to be loved and cared for." These words gave me strength when I needed it most.'
                        },
                        isDefault: true
                    }
                ]);
            }, []);

            // 计算所有照片和回忆
            const allPhotos = [...defaultPhotos, ...uploadedPhotos];
            const allMemories = [
                ...defaultMemories,
                ...(notepadContent.trim() ? [{
                    id: 'notepad',
                    title: { zh: '我的心灵笔记', en: 'My Heart Notes' },
                    content: { zh: notepadContent, en: notepadContent },
                    isNotepad: true
                }] : [])
            ];

            // 音频控制函数
            const playAudio = (audioUrl) => {
                if (audioRef.current) {
                    audioRef.current.src = audioUrl;
                    audioRef.current.play();
                }
            };

            const stopAudio = () => {
                if (audioRef.current) {
                    audioRef.current.pause();
                    audioRef.current.currentTime = 0;
                    setIsAudioPlaying(false);
                }
            };

            const pauseAudio = () => {
                if (audioRef.current) {
                    audioRef.current.pause();
                }
            };

            const resumeAudio = () => {
                if (audioRef.current) {
                    audioRef.current.play();
                }
            };

            const playNextAudio = () => {
                if (uploadedAudios.length > 0) {
                    const nextIndex = (currentIndex + 1) % uploadedAudios.length;
                    setCurrentIndex(nextIndex);
                    const nextAudio = uploadedAudios[nextIndex];
                    if (nextAudio && audioRef.current) {
                        audioRef.current.src = nextAudio.audioUrl;
                        audioRef.current.play();
                    }
                }
            };

            // SOS 功能
            const startSOS = (mode) => {
                setCurrentIndex(0);
                setCurrentView(mode);
                
                if (sosIntervalRef.current) {
                    clearInterval(sosIntervalRef.current);
                }

                if (photoDuration > 0 && (mode === 'slideshow' || mode === 'mixed-photo-audio' || mode === 'memories-slideshow' || mode === 'mixed-memory-audio')) {
                    sosIntervalRef.current = setInterval(() => {
                        setCurrentIndex(prev => {
                            if (mode === 'slideshow' || mode === 'mixed-photo-audio') {
                                return (prev + 1) % allPhotos.length;
                            } else {
                                return (prev + 1) % allMemories.length;
                            }
                        });
                    }, photoDuration * 1000);
                }

                // 如果是音频模式，自动播放
                if ((mode === 'audio' || mode === 'mixed-photo-audio' || mode === 'mixed-memory-audio') && uploadedAudios.length > 0) {
                    setTimeout(() => {
                        const audio = uploadedAudios[0];
                        if (audio && audioRef.current) {
                            audioRef.current.src = audio.audioUrl;
                            audioRef.current.play();
                        }
                    }, 500);
                }
            };

            const stopSOS = () => {
                if (sosIntervalRef.current) {
                    clearInterval(sosIntervalRef.current);
                    sosIntervalRef.current = null;
                }
                stopAudio();
                setCurrentView('main');
                setCurrentIndex(0);
            };

            // 清理定时器
            useEffect(() => {
                return () => {
                    if (sosIntervalRef.current) {
                        clearInterval(sosIntervalRef.current);
                    }
                };
            }, []);

            // 渲染主界面
            if (currentView === 'main') {
                return (
                    <div className="container">
                        <button 
                            className="language-btn"
                            onClick={() => setLanguage(prev => prev === 'zh' ? 'en' : 'zh')}
                        >
                            <Globe size={16} style={{marginRight: '4px'}} />
                            {language === 'zh' ? 'EN' : '中'}
                        </button>

                        <div className="card text-center" style={{marginTop: '60px'}}>
                            <Heart size={64} color="#ec4899" style={{margin: '0 auto 24px'}} />
                            <h1 style={{fontSize: '28px', fontWeight: 'bold', color: '#1f2937', marginBottom: '16px'}}>
                                {t.appTitle}
                            </h1>
                            <p style={{color: '#6b7280', fontSize: '16px', marginBottom: '32px'}}>
                                {t.tagline}
                            </p>

                            <button 
                                className="sos-button"
                                onClick={() => {
                                    if (allPhotos.length > 0) {
                                        startSOS('slideshow');
                                    } else if (uploadedAudios.length > 0) {
                                        startSOS('audio');
                                    } else if (allMemories.length > 0) {
                                        startSOS('memories-slideshow');
                                    } else {
                                        alert(language === 'zh' ? '请先上传照片、音频或写下回忆' : 'Please upload photos, audios or write memories first');
                                    }
                                }}
                            >
                                🆘 {t.sosButton}
                            </button>

                            <div className="grid grid-2 mb-6">
                                <button 
                                    className="btn btn-secondary"
                                    onClick={() => setCurrentView('photos')}
                                >
                                    <Camera size={20} />
                                    {t.safePhotos}
                                </button>
                                <button 
                                    className="btn btn-secondary"
                                    onClick={() => setCurrentView('audios')}
                                >
                                    <Mic size={20} />
                                    {t.supportSounds}
                                </button>
                                <button 
                                    className="btn btn-secondary"
                                    onClick={() => setCurrentView('memories')}
                                >
                                    <MessageCircle size={20} />
                                    {t.positiveMemories}
                                </button>
                                <button 
                                    className="btn btn-secondary"
                                    onClick={() => setCurrentView('mixed-mode')}
                                >
                                    <Settings size={20} />
                                    {t.mixedMode}
                                </button>
                            </div>

                            <div className="settings-section">
                                <h3 style={{fontWeight: '600', marginBottom: '16px'}}>{t.photoSettings}</h3>
                                <p style={{fontSize: '14px', color: '#6b7280', marginBottom: '12px'}}>
                                    {t.photoDuration}
                                </p>
                                <div className="settings-grid">
                                    {[
                                        {value: 10, label: `10 ${t.seconds}`},
                                        {value: 20, label: `20 ${t.seconds}`},
                                        {value: 60, label: `1 ${t.minute}`},
                                        {value: 300, label: `5 ${t.minutes}`},
                                        {value: 1800, label: `30 ${t.minutes}`},
                                        {value: 0, label: t.permanent}
                                    ].map(option => (
                                        <button
                                            key={option.value}

                                                    fileSize: (file.size / 1024 / 1024).toFixed(2) + ' MB',

                                                        en: file.name.replace(/\.[^/.]+$/, "")

                                                setUploadedPhotos(prev => [...prev, newPhoto]);

                                            e.target.value = '';

                                                            marginRight: '8px'
                                                        }}>
                                                            {index + 1}
                                                        </span>
                                                        <span style={{fontSize: '12px', color: 'white'}}>
                                                            {photo.description[language]}

                                                            border: 'none',

                                                    fileSize: (file.size / 1024 / 1024).toFixed(2) + ' MB',
                                                    fileType: file.type || 'Unknown'

                                                setUploadedAudios(prev => [...prev, newAudio]);
                                            });
                                            e.target.value = '';
                                        }}

                                            position: 'absolute',
                                            top: 0,

                                            width: '100%',

                                                                borderRadius: '12px',
                                                                marginRight: '12px'
                                                            }}>
                                                                {index + 1}
                                                            </span>
                                                            <p style={{fontWeight: '600', fontSize: '14px', margin: 0, overflow: 'hidden', textOverflow: 'ellipsis'}}>
                                                                {audio.fileName}
                                                            </p>
                                                        </div>
                                                        <p style={{fontSize: '12px', color: '#6b7280', margin: '4px 0 0', marginLeft: '40px'}}>
                                                            {audio.fileSize} • {audio.fileType}
                                                        </p>
                                                    </div>
                                                    <div style={{display: 'flex', gap: '8px', marginLeft: '8px'}}>
                                                        <button
                                                            className="btn btn-success"
                                                            onClick={() => playAudio(audio.audioUrl)}
                                                            style={{padding: '6px 12px', fontSize: '12px'}}
                                                        >
                                                            <Play size={14} />
                                                            {language === 'zh' ? '播放' : 'Play'}
                                                        </button>
                                                        {isAudioPlaying && (
                                                            <button
                                                                className="btn btn-warning"
                                                                onClick={stopAudio}
                                                                style={{padding: '6px 12px', fontSize: '12px'}}
                                                            >
                                                                <Pause size={14} />
                                                                {language === 'zh' ? '停止' : 'Stop'}
                                                            </button>
                                                        )}
                                                        <button
                                                            onClick={() => {
                                                                setUploadedAudios(prev => prev.filter(a => a.id !== audio.id));
                                                                URL.revokeObjectURL(audio.audioUrl);
                                                            }}
                                                            style={{
                                                                background: '#ef4444',
                                                                color: 'white',
                                                                border: 'none',
                                                                borderRadius: '6px',
                                                                padding: '6px 12px',
                                                                cursor: 'pointer',
                                                                fontSize: '12px'
                                                            }}
                                                        >
                                                            删除
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                ) : (
                                    <div className="text-center" style={{color: '#6b7280', marginTop: '32px'}}>
                                        <Mic size={48} color="#d1d5db" style={{margin: '0 auto 16px'}} />
                                        <p style={{marginBottom: '8px', fontWeight: '500'}}>
                                            {language === 'zh' ? '还没有上传任何音频文件' : 'No audio files uploaded yet'}
                                        </p>
                                        <p style={{fontSize: '14px', padding: '0 16px'}}>
                                            {language === 'zh' ? 
                                                '开始收集那些能给你力量的声音吧 - 也许是妈妈的叮咛，朋友的鼓励，或是你最爱的歌曲' : 
                                                'Start collecting sounds that give you strength - maybe mom\'s caring words, a friend\'s encouragement, or your favorite song'}
                                        </p>
                                    </div>
                                )}
                            </div>
                        </div>

                        <audio 
                            ref={audioRef} 
                            style={{ display: 'none' }} 
                            onEnded={() => setIsAudioPlaying(false)}
                            onPause={() => setIsAudioPlaying(false)}
                            onPlay={() => setIsAudioPlaying(true)}
                            preload="auto"
                        />
                    </div>
                );
            }

            // 回忆管理视图
            if (currentView === 'memories') {
                return (
                    <div className="container">
                        <div style={{marginTop: '40px'}}>
                            <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '24px', padding: '0 16px'}}>
                                <button
                                    className="btn btn-secondary"
                                    onClick={() => setCurrentView('main')}
                                >
                                    {t.back}
                                </button>
                                <h2 style={{fontSize: '20px', fontWeight: 'bold'}}>{t.yourMemories}</h2>
                                <div></div>
                            </div>

                            <div className="card">
                                <h3 style={{fontWeight: '600', marginBottom: '16px', textAlign: 'center'}}>
                                    {language === 'zh' ? '✨ 心灵笔记 ✨' : '✨ Heart Notes ✨'}
                                </h3>
                                
                                <div style={{
                                    background: 'linear-gradient(135deg, #fef3c7 0%, #fde68a 100%)',
                                    border: '1px solid #f59e0b',
                                    padding: '16px',
                                    borderRadius: '12px',
                                    marginBottom: '16px'
                                }}>
                                    <p style={{fontSize: '14px', color: '#92400e', lineHeight: '1.5', textAlign: 'center'}}>
                                        {language === 'zh' ? 
                                            '💝 在这里写下那些温暖的话语，记录美好的时刻，或是给自己的鼓励。在需要的时候，这些文字会成为你内心的光芒。' : 
                                            '💝 Write warm words here, record beautiful moments, or give yourself encouragement. When needed, these words will become the light in your heart.'}
                                    </p>
                                </div>
                                
                                <textarea
                                    value={notepadContent}
                                    onChange={(e) => setNotepadContent(e.target.value)}
                                    placeholder={language === 'zh' ? 
                                        '在这里写下你的美好回忆、成就、感谢的话语，或任何能让你感到温暖的文字...\n\n例如：\n• 今天我完成了一个重要的项目\n• 朋友给了我很大的支持\n• 我比昨天的自己更强大了' : 
                                        'Write your beautiful memories, achievements, words of gratitude, or any text that makes you feel warm...\n\nFor example:\n• Today I completed an important project\n• Friends gave me great support\n• I am stronger than yesterday'}
                                    style={{
                                        width: '100%',
                                        height: '200px',
                                        padding: '16px',
                                        border: '2px solid #f3e8ff',
                                        borderRadius: '12px',
                                        resize: 'none',
                                        fontSize: '14px',
                                        lineHeight: '1.6',
                                        fontFamily: 'system-ui, -apple-system, sans-serif',
                                        background: '#fefefe',
                                        boxSizing: 'border-box'
                                    }}
                                />
                                
                                <div style={{marginTop: '12px', textAlign: 'center'}}>
                                    <p style={{fontSize: '12px', color: '#6b7280'}}>
                                        {language === 'zh' ? 
                                            `已写入 ${notepadContent.length} 个字符` : 
                                            `${notepadContent.length} characters written`}
                                    </p>
                                </div>
                            </div>

                            <div className="card">
                                <h4 style={{fontWeight: '600', color: '#374151', marginBottom: '16px'}}>
                                    {language === 'zh' ? '所有美好回忆' : 'All Beautiful Memories'}
                                </h4>
                                
                                {allMemories.length > 0 ? (
                                    <div>
                                        {allMemories.map((memory, index) => (
                                            <div key={memory.id} className="memory-item">
                                                <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start'}}>
                                                    <div style={{flex: 1}}>
                                                        <div style={{display: 'flex', alignItems: 'center', marginBottom: '8px'}}>
                                                            <span style={{
                                                                background: '#ec4899',
                                                                color: 'white',
                                                                fontSize: '14px',
                                                                padding: '4px 12px',
                                                                borderRadius: '12px',
                                                                marginRight: '12px'
                                                            }}>
                                                                {index + 1}
                                                            </span>
                                                            <h3 style={{fontWeight: '600', fontSize: '16px', margin: 0}}>
                                                                {memory.title[language]}
                                                            </h3>
                                                        </div>
                                                        <p style={{color: '#374151', fontSize: '14px', lineHeight: '1.5', margin: 0}}>
                                                            {memory.content[language]}
                                                        </p>
                                                    </div>
                                                    <div style={{marginLeft: '8px'}}>
                                                        {memory.isNotepad && (
                                                            <button
                                                                onClick={() => setNotepadContent('')}
                                                                style={{
                                                                    background: '#f59e0b',
                                                                    color: 'white',
                                                                    border: 'none',
                                                                    borderRadius: '6px',
                                                                    padding: '4px 12px',
                                                                    cursor: 'pointer',
                                                                    fontSize: '12px',
                                                                    marginBottom: '4px'
                                                                }}
                                                            >
                                                                {language === 'zh' ? '清空' : 'Clear'}
                                                            </button>
                                                        )}
                                                        {memory.isDefault && (
                                                            <button
                                                                onClick={() => setDefaultMemories(prev => prev.filter(m => m.id !== memory.id))}
                                                                style={{
                                                                    background: '#ef4444',
                                                                    color: 'white',
                                                                    border: 'none',
                                                                    borderRadius: '6px',
                                                                    padding: '4px 12px',
                                                                    cursor: 'pointer',
                                                                    fontSize: '12px'
                                                                }}
                                                            >
                                                                {language === 'zh' ? '删除' : 'Delete'}
                                                            </button>
                                                        )}
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                ) : (
                                    <div className="text-center" style={{color: '#6b7280', marginTop: '32px'}}>
                                        <FileText size={48} color="#d1d5db" style={{margin: '0 auto 16px'}} />
                                        <p style={{marginBottom: '8px', fontWeight: '500'}}>
                                            {language === 'zh' ? '还没有任何回忆记录' : 'No memory records yet'}
                                        </p>
                                        <p style={{fontSize: '14px', padding: '0 16px'}}>
                                            {language === 'zh' ? 
                                                '开始记录那些让你感到骄傲和快乐的时刻吧' : 
                                                'Start recording moments that make you feel proud and happy'}
                                        </p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            // 混合模式：照片+音乐
            if (currentView === 'mixed-photo-audio') {
                if (allPhotos.length === 0 || uploadedAudios.length === 0) {
                    return (
                        <div className="container">
                            <div className="card text-center" style={{marginTop: '80px'}}>
                                <div style={{display: 'flex', justifyContent: 'center', gap: '16px', marginBottom: '24px'}}>
                                    <Camera size={32} color="#ec4899" />
                                    <Volume2 size={32} color="#3b82f6" />
                                </div>
                                <h2 style={{fontSize: '20px', fontWeight: 'bold', marginBottom: '16px'}}>
                                    {language === 'zh' ? '需要照片和音频' : 'Photos and Audio Required'}
                                </h2>
                                <p style={{color: '#6b7280', marginBottom: '24px'}}>
                                    {language === 'zh' ? 
                                        '使用混合模式需要同时有照片和音频文件' : 
                                        'Mixed mode requires both photos and audio files'}
                                </p>
                                <div style={{display: 'flex', gap: '12px', justifyContent: 'center'}}>
                                    {allPhotos.length === 0 && (
                                        <button
                                            className="btn btn-primary"
                                            onClick={() => setCurrentView('photos')}
                                        >
                                            {t.uploadPhotos}
                                        </button>
                                    )}
                                    {uploadedAudios.length === 0 && (
                                        <button
                                            className="btn btn-primary"
                                            onClick={() => setCurrentView('audios')}
                                        >
                                            {t.uploadAudios}
                                        </button>
                                    )}
                                </div>
                            </div>
                        </div>
                    );
                }

                const currentPhoto = allPhotos[currentIndex] || allPhotos[0];
                return (
                    <div className="fullscreen-view">
                        <img
                            src={currentPhoto.url}
                            alt={currentPhoto.description[language]}
                            className="fullscreen-image"
                        />
                        
                        <div className="fullscreen-controls">
                            <div className="mixed-controls">
                                <p style={{fontSize: '18px', marginBottom: '8px'}}>
                                    {currentPhoto.description[language]}
                                </p>
                                
                                {uploadedAudios[currentIndex % uploadedAudios.length] && (
                                    <div style={{fontSize: '14px', marginBottom: '16px', opacity: 0.8}}>
                                        🎵 {uploadedAudios[currentIndex % uploadedAudios.length].fileName}
                                        {isAudioPlaying && (
                                            <span style={{marginLeft: '8px', color: '#10b981'}}>
                                                {language === 'zh' ? '播放中...' : 'Playing...'}
                                            </span>
                                        )}
                                    </div>
                                )}
                                
                                <div style={{display: 'flex', justifyContent: 'center', gap: '12px'}}>
                                    <button
                                        className="btn btn-danger"
                                        onClick={stopSOS}
                                    >
                                        {t.stop}
                                    </button>
                                    {isAudioPlaying && (
                                        <button
                                            className="btn btn-warning"
                                            onClick={pauseAudio}
                                        >
                                            {t.pause}
                                        </button>
                                    )}
                                    {!isAudioPlaying && uploadedAudios.length > 0 && (
                                        <button
                                            className="btn btn-success"
                                            onClick={resumeAudio}
                                        >
                                            {t.resume}
                                        </button>
                                    )}
                                </div>
                            </div>
                        </div>
                        
                        <div className="progress-indicator">
                            📸 {currentIndex + 1} / {allPhotos.length}
                        </div>

                        <div className="duration-indicator">
                            {photoDuration === 0 && t.permanent}
                            {photoDuration === 10 && `10 ${t.seconds}`}
                            {photoDuration === 20 && `20 ${t.seconds}`}
                            {photoDuration === 60 && `1 ${t.minute}`}
                            {photoDuration === 300 && `5 ${t.minutes}`}
                            {photoDuration === 1800 && `30 ${t.minutes}`}
                        </div>
                        
                        <button
                            className="nav-button left"
                            onClick={() => setCurrentIndex((prev) => (prev - 1 + allPhotos.length) % allPhotos.length)}
                        >
                            ←
                        </button>
                        <button
                            className="nav-button right"
                            onClick={() => setCurrentIndex((prev) => (prev + 1) % allPhotos.length)}
                        >
                            →
                        </button>

                        <audio 
                            ref={audioRef} 
                            style={{ display: 'none' }} 
                            onEnded={playNextAudio}
                            onPause={() => setIsAudioPlaying(false)}
                            onPlay={() => setIsAudioPlaying(true)}
                            preload="auto"
                        />
                    </div>
                );
            }

            // 混合模式：回忆+音乐
            if (currentView === 'mixed-memory-audio') {
                if (allMemories.length === 0 || uploadedAudios.length === 0) {
                    return (
                        <div className="container">
                            <div className="card text-center" style={{marginTop: '80px'}}>
                                <div style={{display: 'flex', justifyContent: 'center', gap: '16px', marginBottom: '24px'}}>
                                    <MessageCircle size={32} color="#ec4899" />
                                    <Volume2 size={32} color="#3b82f6" />
                                </div>
                                <h2 style={{fontSize: '20px', fontWeight: 'bold', marginBottom: '16px'}}>
                                    {language === 'zh' ? '需要回忆和音频' : 'Memories and Audio Required'}
                                </h2>
                                <p style={{color: '#6b7280', marginBottom: '24px'}}>
                                    {language === 'zh' ? 
                                        '使用混合模式需要同时有回忆记录和音频文件' : 
                                        'Mixed mode requires both memory records and audio files'}
                                </p>
                                <div style={{display: 'flex', gap: '12px', justifyContent: 'center'}}>
                                    {allMemories.length === 0 && (
                                        <button
                                            className="btn btn-primary"
                                            onClick={() => setCurrentView('memories')}
                                        >
                                            {t.writeMemory}
                                        </button>
                                    )}
                                    {uploadedAudios.length === 0 && (
                                        <button
                                            className="btn btn-primary"
                                            onClick={() => setCurrentView('audios')}
                                        >
                                            {t.uploadAudios}
                                        </button>
                                    )}
                                </div>
                            </div>
                        </div>
                    );
                }

                const currentMemory = allMemories[currentIndex] || allMemories[0];
                return (
                    <div className="container">
                        <div className="card text-center" style={{marginTop: '40px'}}>
                            <MessageCircle size={64} color="#ec4899" style={{margin: '0 auto 24px'}} />
                            <h2 style={{fontSize: '20px', fontWeight: 'bold', marginBottom: '16px'}}>
                                {currentMemory.title[language]}
                            </h2>
                            
                            <div style={{
                                background: 'linear-gradient(135deg, #fdf4ff 0%, #fae8ff 100%)',
                                border: '1px solid #d946ef',
                                padding: '24px',
                                borderRadius: '12px',
                                marginBottom: '16px',
                                maxHeight: '300px',
                                overflowY: 'auto'
                            }}>
                                <p style={{
                                    color: '#374151',
                                    lineHeight: '1.6',
                                    whiteSpace: 'pre-wrap',
                                    textAlign: 'left',
                                    margin: 0
                                }}>
                                    {currentMemory.content[language]}
                                </p>
                            </div>
                            
                            {uploadedAudios[currentIndex % uploadedAudios.length] && (
                                <div style={{
                                    background: 'linear-gradient(135derg, #dbeafe 0%, #bfdbfe 100%)',
                                    border: '1px solid #3b82f6',
                                    padding: '12px',
                                    borderRadius: '12px',
                                    marginBottom: '16px'
                                }}>
                                    <div style={{fontSize: '14px', color: '#374151'}}>
                                        🎵 {uploadedAudios[currentIndex % uploadedAudios.length].fileName}
                                        {isAudioPlaying && (
                                            <span style={{marginLeft: '8px', color: '#10b981', fontWeight: '600'}}>
                                                {language === 'zh' ? '播放中...' : 'Playing...'}
                                            </span>
                                        )}
                                    </div>
                                </div>
                            )}
                            
                            <p style={{fontSize: '14px', color: '#8b5cf6', marginBottom: '16px'}}>
                                {language === 'zh' ? 
                                    `回忆: ${currentIndex + 1} / ${allMemories.length}` : 
                                    `Memory: ${currentIndex + 1} / ${allMemories.length}`}
                            </p>
                            
                            <div style={{display: 'flex', justifyContent: 'center', gap: '12px', marginBottom: '16px'}}>
                                <button
                                    className="btn btn-danger"
                                    onClick={stopSOS}
                                >
                                    {t.stop}
                                </button>
                                {isAudioPlaying && (
                                    <button
                                        className="btn btn-warning"
                                        onClick={pauseAudio}
                                    >
                                        {t.pause}
                                    </button>
                                )}
                                {!isAudioPlaying && uploadedAudios.length > 0 && (
                                    <button
                                        className="btn btn-success"
                                        onClick={resumeAudio}
                                    >
                                        {t.resume}
                                    </button>
                                )}
                            </div>

                            {allMemories.length > 1 && (
                                <div style={{display: 'flex', justifyContent: 'center', gap: '8px'}}>
                                    <button
                                        className="btn btn-secondary"
                                        onClick={() => {
                                            const prevIndex = (currentIndex - 1 + allMemories.length) % allMemories.length;
                                            setCurrentIndex(prevIndex);
                                        }}
                                        style={{padding: '8px 16px', fontSize: '14px'}}
                                    >
                                        {language === 'zh' ? '← 上一个' : '← Previous'}
                                    </button>
                                    <button
                                        className="btn btn-secondary"
                                        onClick={() => {
                                            const nextIndex = (currentIndex + 1) % allMemories.length;
                                            setCurrentIndex(nextIndex);
                                        }}
                                        style={{padding: '8px 16px', fontSize: '14px'}}
                                    >
                                        {language === 'zh' ? '下一个 →' : 'Next →'}
                                    </button>
                                </div>
                            )}

                            <audio 
                                ref={audioRef} 
                                style={{ display: 'none' }} 
                                onEnded={playNextAudio}
                                onPause={() => setIsAudioPlaying(false)}
                                onPlay={() => setIsAudioPlaying(true)}
                                preload="auto"
                            />
                        </div>
                    </div>
                );
            }

            return null;
        };

        ReactDOM.render(React.createElement(EmotionalSupportApp), document.getElementById('root'));
    </script>
</body>
</html>
